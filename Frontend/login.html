<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Kiosk - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            border: 1px solid #ddd;
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0,255,255,0.3);
            background-color: #fff;
            animation : floatCard 3s ease-in-out infinite;
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        button:hover{
            transform: scale(1.05);
            box-shadow: 0 0 15px cyan;
            transition: 0.3s;
        }
        body{
            margin:0;
            min-height:100vh;

            display:flex;
            flex-direction:column;

            justify-content:center;
            align-items:center;

            background:
                linear-gradient(rgba(10,15,26,0.9), rgba(15,32,39,0.9)),
                url("https://images.unsplash.com/photo-1504674900247-0877df9cc836");

            background-size:cover;
            color:white;
            min-height:100vh;
            position:relative;
        }

        .login-container{
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(12px);
            border:1px solid rgba(0,255,255,0.2);
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .footer{
            position:absolute;
            bottom:15px;
            width:100%;
            text-align:center;
            opacity:0.7;
            font-size:14px;
        }
        .loader{
            width:50px;
            height:50px;
            border:5px solid rgba(255,255,255,0.2);
            border-top:5px solid #00ffee;
            border-radius:50%;
            animation: spin 1s linear infinite;
            margin:20px auto;
            display:none;
        }

        @keyframes spin{
        0%{
            transform:rotate(0deg);
        }
        100%{
            transform:rotate(360deg);
        }
        }

        input:focus{
            border: 2px solid cyan;
            box-shadow: 0 0 10px cyan;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .button-group button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .login-btn {
            background-color: #4CAF50;
            color: white;
        }
        .login-btn:hover {
            background-color: #45a049;
        }
        .register-btn {
            background-color: #008CBA;
            color: white;
        }
        .register-btn:hover {
            background-color: #007399;
        }
        .message {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        .error {
            background-color: #ffdddd;
            color: #d32f2f;
        }
        .success {
            background-color: #ddffdd;
            color: #388e3c;
        }

        @keyframes floatCard{

        0%{
            transform: translateY(0px);
        }

        50%{
            transform: translateY(-8px);
        }

        100%{
            transform: translateY(0px);
        }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🔐 Smart Kiosk Login</h2>
        <div class="loader" id="loginLoader"></div>
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" placeholder="Enter your username">
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>
        <div class="button-group">
            <button class="login-btn" onclick="login()">Login</button>
            <button class="register-btn" onclick="register()">Register</button>
        </div>
        <div id="message" class="message"></div>
    </div>
    <script>
    if(localStorage.getItem("token")){
        window.location.href = "index.html";
    }
    </script>
    <script src="script.js"></script>
    <footer class="footer"> Smart Kiosk © 2026 | All rights reserved </footer>
</body>
</html>
